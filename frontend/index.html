<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buffett AI - M7 주식 예측</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">📈</span>
                <span class="logo-text">Buffett <strong>AI</strong></span>
            </div>
        </div>
    </header>

    <main class="main">
        <!-- 히어로 섹션 -->
        <section class="hero">
            <h1>AI 기반 주식 예측 시스템</h1>
            <p>LSTM 딥러닝 모델로 <strong>M7 종목의 5일 후 수익률</strong>을 예측합니다.</p>
        </section>

        <!-- M7 예측 종목 -->
        <section class="top-picks-section">
            <h2>M7 주식 예측 결과</h2>
            <div class="card">
                <table class="table" id="m7Table">
                    <thead>
                        <tr>
                            <th>종목 코드</th>
                            <th>회사명</th>
                            <th>현재 주가</th>
                            <th>예측 수익률</th>
                            <th>예측 주가</th>
                            <th>신뢰도</th>
                            <th>분석</th>
                        </tr>
                    </thead>
                    <tbody id="topPicksBody">
                        <tr><td colspan="7" class="text-center loading-text">데이터 로딩 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>Buffett AI &copy; 2026 | 본 서비스는 투자 참고용이며 투자 손실에 대한 책임은 투자자 본인에게 있습니다.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
