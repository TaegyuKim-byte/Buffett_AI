<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예측 결과 - Buffett AI</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">📈</span>
                <span class="logo-text">Buffett <strong>AI</strong></span>
            </div>
            <nav class="nav">
                <a href="../index.html" class="nav-link">대시보드</a>
                <a href="predictions.html" class="nav-link active">예측 결과</a>
                <a href="backtest.html" class="nav-link">백테스트</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <section class="search-section card">
            <h2>종목별 예측 조회</h2>
            <div class="search-row">
                <input
                    type="text"
                    id="tickerInput"
                    class="input"
                    placeholder="종목 코드 입력 (예: AAPL, NVDA)"
                    value="AAPL"
                />
                <button class="btn btn-primary" onclick="loadHistory()">조회</button>
                <button class="btn btn-secondary" onclick="loadM7()">M7 전체 보기</button>
            </div>
            <div id="errorMsg" class="error-msg hidden"></div>
        </section>

        <section>
            <h2>예측 결과 리스트</h2>
            <div class="card">
                <table class="table">
                    <thead>
                        <tr>
                            <th>종목</th>
                            <th>예측일</th>
                            <th>대상일 (+5일)</th>
                            <th>현재가</th>
                            <th>예측가</th>
                            <th>예측 수익률</th>
                            <th>상태</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr><td colspan="7" class="text-center loading-text">데이터를 조회해 주세요.</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>Buffett AI &copy; 2026 | 본 서비스는 투자 참고용이며 투자 손실에 대한 책임은 투자자 본인에게 있습니다.</p>
    </footer>

    <script src="../js/api.js"></script>
    <script>
        // 1. 개별 종목 조회
        async function loadHistory() {
            const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
            if (!ticker) return;

            renderLoading();

            try {
                const data = await fetchPredictionsByTicker(ticker); 
                const dataList = Array.isArray(data) ? data : [data];
                renderTable(dataList);
            } catch (err) {
                renderError(err.message);
            }
        }

        // 2. M7 전체 조회
        async function loadM7() {
            renderLoading();
            try {
                const data = await fetchM7Predictions(); 
                renderTable(data);
            } catch (err) {
                renderError(err.message);
            }
        }

        // --- 화면 그리기 로직 (여기서 api.js의 포맷팅 함수를 사용합니다) ---
        function renderTable(dataList) {
            const tbody = document.getElementById('historyBody');
            
            // 데이터가 비어있거나 검색 결과가 없는 경우 처리
            if (!dataList || dataList.length === 0 || (dataList.length === 1 && !dataList[0].ticker)) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">데이터가 없습니다.</td></tr>';
                return;
            }

            tbody.innerHTML = dataList.map(p => {
                const isPos = p.expected_return >= 0;
                // 상태 태그 결정
                const statusTag = p.available 
                    ? '<span class="badge success">예측완료</span>' 
                    : '<span class="badge gray">데이터없음</span>';

                return `
                    <tr>
                        <td><strong>${p.ticker}</strong></td>
                        <td>${formatDate(p.prediction_date)}</td>
                        <td>${formatDate(p.target_date)}</td>
                        <td>${formatPrice(p.current_price)}</td>
                        <td>${formatPrice(p.predicted_price)}</td>
                        <td class="${isPos ? 'positive' : 'negative'}">${formatReturn(p.expected_return)}</td>
                        <td>${statusTag}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderLoading() {
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('historyBody').innerHTML = '<tr><td colspan="7" class="text-center loading-text">데이터 로딩 중...</td></tr>';
        }

        function renderError(msg) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = '조회 실패: ' + msg;
            errorEl.classList.remove('hidden');
            document.getElementById('historyBody').innerHTML = '<tr><td colspan="7" class="text-center">데이터 로드 실패</td></tr>';
        }
    </script>
</body>
</html>
