<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>백테스트 - Buffett AI</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">📈</span>
                <span class="logo-text">Buffett <strong>AI</strong></span>
            </div>
            <nav class="nav">
                <a href="../index.html" class="nav-link">대시보드</a>
                <a href="predictions.html" class="nav-link">예측 결과</a>
                <a href="backtest.html" class="nav-link active">백테스트</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <section class="hero">
            <h1>AI 모델 성적표</h1>
            <p>과거 데이터 기반 백테스트 결과를 확인합니다.<br>
               평가 지표: 수익률, 최대 낙폭(MDD), 샤프 비율, 예측 정확도</p>
        </section>

        <section class="search-section card">
            <h2>백테스트 결과 조회</h2>
            <div class="search-row">
                <input
                    type="text"
                    id="modelInput"
                    class="input"
                    placeholder="모델 버전 (비워두면 전체 조회)"
                />
                <button class="btn btn-primary" onclick="loadBacktest()">조회</button>
            </div>
            <div id="errorMsg" class="error-msg hidden"></div>
        </section>

        <!-- 요약 통계 -->
        <section id="summarySection" class="hidden">
            <h2>최근 백테스트 요약</h2>
            <div class="cards-grid" id="summaryCards"></div>
        </section>

        <!-- 백테스트 결과 테이블 -->
        <section>
            <h2>백테스트 이력</h2>
            <div class="card">
                <table class="table">
                    <thead>
                        <tr>
                            <th>시작일</th>
                            <th>종료일</th>
                            <th>모델 버전</th>
                            <th>수익률</th>
                            <th>최대 낙폭(MDD)</th>
                            <th>샤프 비율</th>
                            <th>정확도</th>
                            <th>거래 수</th>
                            <th>승리 거래</th>
                            <th>전략</th>
                        </tr>
                    </thead>
                    <tbody id="backtestBody">
                        <tr><td colspan="10" class="text-center loading-text">데이터 로딩 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>Buffett AI &copy; 2026 | 본 서비스는 투자 참고용이며 투자 손실에 대한 책임은 투자자 본인에게 있습니다.</p>
    </footer>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadBacktest);

        async function loadBacktest() {
            const model = document.getElementById('modelInput').value.trim() || null;
            document.getElementById('errorMsg').classList.add('hidden');
            const tbody = document.getElementById('backtestBody');
            tbody.innerHTML = '<tr><td colspan="10" class="text-center loading-text">로딩 중...</td></tr>';

            try {
                const data = await fetchBacktestResults(model);
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="10" class="text-center">백테스트 데이터가 없습니다.</td></tr>';
                    return;
                }
                renderSummary(data[0]);
                tbody.innerHTML = data.map(b => {
                    const retIsPos = b.totalReturn >= 0;
                    return `
                        <tr>
                            <td>${formatDate(b.startDate)}</td>
                            <td>${formatDate(b.endDate)}</td>
                            <td>${b.modelVersion ?? '-'}</td>
                            <td class="${retIsPos ? 'positive' : 'negative'}">${b.totalReturn != null ? (retIsPos ? '+' : '') + b.totalReturn.toFixed(2) + '%' : '-'}</td>
                            <td class="negative">${b.maxDrawdown != null ? b.maxDrawdown.toFixed(2) + '%' : '-'}</td>
                            <td>${b.sharpeRatio != null ? b.sharpeRatio.toFixed(2) : '-'}</td>
                            <td>${b.accuracy != null ? (b.accuracy * 100).toFixed(1) + '%' : '-'}</td>
                            <td>${b.totalTrades ?? '-'}</td>
                            <td>${b.winningTrades ?? '-'}</td>
                            <td>${b.strategyDescription ?? '-'}</td>
                        </tr>
                    `;
                }).join('');
            } catch (err) {
                document.getElementById('errorMsg').textContent = '조회 실패: ' + err.message;
                document.getElementById('errorMsg').classList.remove('hidden');
                tbody.innerHTML = '<tr><td colspan="10" class="text-center">데이터 로드 실패</td></tr>';
            }
        }

        function renderSummary(b) {
            if (!b) return;
            document.getElementById('summarySection').classList.remove('hidden');
            const retIsPos = b.totalReturn >= 0;
            document.getElementById('summaryCards').innerHTML = `
                <div class="card stat-card">
                    <div class="stat-label">수익률</div>
                    <div class="stat-value ${retIsPos ? 'positive' : 'negative'}">${b.totalReturn != null ? (retIsPos ? '+' : '') + b.totalReturn.toFixed(2) + '%' : '-'}</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-label">최대 낙폭 (MDD)</div>
                    <div class="stat-value negative">${b.maxDrawdown != null ? b.maxDrawdown.toFixed(2) + '%' : '-'}</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-label">샤프 비율</div>
                    <div class="stat-value">${b.sharpeRatio != null ? b.sharpeRatio.toFixed(2) : '-'}</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-label">예측 정확도</div>
                    <div class="stat-value">${b.accuracy != null ? (b.accuracy * 100).toFixed(1) + '%' : '-'}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
