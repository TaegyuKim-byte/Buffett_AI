spring:
  datasource:
    url: jdbc:mysql://localhost:3306/buffett_ai?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8080

ai:
  api:
    base-url: ${AI_API_URL:http://localhost:8000}
    timeout: 30000

logging:
  level:
    com.buffettai: INFO
    org.springframework.web: INFO
